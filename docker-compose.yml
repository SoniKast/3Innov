services:
  admininterface.server:
    image: ${DOCKER_REGISTRY-}admininterfaceserver
    ports:
      - 5000:80
    build:
      context: .
      dockerfile: AdminInterface/AdminInterface.Server/Dockerfile
    depends_on:
      - mysql
    environment:
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=innovationprojet2025;user=root;password=
    networks: 
      - dev-network

  admininterface.client:
    image: admininterfaceclient
    build:
      context: AdminInterface/admininterface.client
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
    depends_on:
      - admininterface.server
    networks: 
      - dev-network

  mysql:
    image: mysql:latest
    restart: always
    environment:
        MYSQL_DATABASE: 'innovationprojet2025'
        MYSQL_USER: 'root'
        MYSQL_PASSWORD: ''
        MYSQL_ROOT_PASSWORD: ''
    ports:
        - '3306:3306'
    expose:
        - '3306'
    volumes:
        - db:/var/lib/mysql
    networks:
      - dev-network

volumes:
  db:

networks:
  dev-network: {}    